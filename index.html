
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Meta + TikTok pixel stubs and deferred SDK loader. Extracted
     from inline scripts to /pixel-init.js so Vite dev server can
     parse this HTML cleanly. Synchronous in <head> so fbq()/ttq()
     calls queue correctly before the SDKs land. -->
<script src="/pixel-init.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Barber</title>
    <meta name="description" content="Generate a custom barbershop website in seconds." />
    <!-- Open Graph + Twitter — what iMessage, Slack, Facebook, and
         every other link-preview crawler reads. Without these, shares
         fall back to the page <title> with no rich preview. -->
    <meta property="og:title" content="AI Barber" />
    <meta property="og:site_name" content="AI Barber" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="Generate a custom barbershop website in seconds." />
    <meta property="og:url" content="https://www.aibarber.org/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Barber" />
    <meta name="twitter:description" content="Generate a custom barbershop website in seconds." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- /new lead-quiz subpage uses the same Manrope + Instrument Serif
         pairing as PrimeHub /barber. Loaded alongside the existing
         Montserrat/Roboto so the legacy homepage UI is untouched. -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <!-- Pexels CDN preconnect for the /new subpage hero video. -->
    <link rel="preconnect" href="https://videos.pexels.com" crossorigin />
    <!-- Pre-warm image CDNs so hero loads in parallel with the JS bundle. -->
    <link rel="preconnect" href="https://images.weserv.nl" crossorigin />
    <link rel="dns-prefetch" href="https://images.weserv.nl" />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://cop5lgctumpj5e0w.public.blob.vercel-storage.com" crossorigin />
    <!-- Preload the barber hero used on /, /booksy, /free-barber, /new
         so the LCP image starts downloading before the JS bundle parses.
         Same weserv.nl wrapper as the React img so no duplicate fetch. -->
    <link rel="preload" as="image"
      href="https://images.weserv.nl/?url=cop5lgctumpj5e0w.public.blob.vercel-storage.com%2Fbarber%2Fnate-johnston-tgPrIYnW3g4-unsplash.jpg&w=1600&q=70&output=webp"
      fetchpriority="high" />
    <style>
        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            touch-action: manipulation;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            scroll-behavior: smooth;
        }
        /* Prevent iOS Safari auto-zoom on input focus (triggers when font-size < 16px) */
        @media (max-width: 767px) {
            input, textarea, select {
                font-size: 16px !important;
            }
        }
        h1, h2, h3, h4, .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }
        .luxury-gradient {
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
        }
        .gold-border {
            border: 1px solid rgba(244, 161, 0, 0.3);
        }
        .gold-text {
            color: #f4a100;
        }
        .gold-bg {
            background-color: #f4a100;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <script>
        // Ensure process.env is safely initialized without overwriting injected values
        window.process = window.process || {};
        window.process.env = window.process.env || {};
    </script>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom": "https://esm.sh/react-dom@^19.2.3",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.3/client",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body>
    <noscript>
 <img height="1" width="1" style="display:none" 
       src="https://www.facebook.com/tr?id=26490568997297314&ev=PageView&noscript=1"/>
</noscript>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
